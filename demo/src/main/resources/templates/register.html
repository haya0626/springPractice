<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>新規登録画面</title>
  </head>
  <body>
    <h1>登録フォーム</h1>

    <form
      th:object="${inputForm}"
      th:action="@{/result/register}"
      method="post"
    >
      <table>
        <tr>
          <td><label>名前</label></td>
          <td><input type="text" th:field="*{name}" /></td>
        </tr>
        <tr>
          <td><label>年齢</label></td>
          <td><input type="text" th:field="*{age}" /></td>
        </tr>
        <tr>
          <td><label>性別</label></td>
          <td><input type="text" th:field="*{gender}" /></td>
        </tr>
        <tr>
          <td><label>住所</label></td>
          <td>
            <textarea cols="40" rows="2" th:field="*{address}"></textarea>
          </td>
        </tr>
        <tr>
          <td><label>希望年収</label></td>
          <td>
            <input type="text" th:field="*{income}" onblur="zeroPad(this, 3)" />
          </td>
        </tr>
        <tr>
          <td><input type="submit" value="登録" /></td>
        </tr>
      </table>
    </form>

    <script>
      function zeroPad(e, length) {
        if (!e.value) return;

        e.value = String(e.value).padStart(length, "0");
      }
    </script>
  </body>
</html>
